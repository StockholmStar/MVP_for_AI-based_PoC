services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: "*"
      AI_WORKSPACE_DATA_DIR: /data
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    environment:
      PORT: 3000
      API_PROXY_TARGET: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"
